name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  # Don't cancel in-progress runs on master — each commit's result is signal.
  # Cancel superseded runs only on feature/PR branches.
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

permissions:
  contents: read

jobs:
  test:
    name: Tests (py3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      QT_QPA_PLATFORM: offscreen   # headless PySide6 GUI tests
    steps:
      - uses: actions/checkout@v4

      - name: Install headless Qt system libs
        run: |
          sudo apt-get update || sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        # Install from pyproject (the source of truth) so CI catches drift
        # from requirements.txt; pip check surfaces dependency conflicts.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip check

      - name: Run test suite (excluding stress)
        run: pytest -m "not stress" --cov --cov-report=xml

      - name: Upload coverage (src/core) — advisory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

      - name: Migration smoke (advisory)
        # Non-blocking: catches alembic head drift early without gating the build.
        # Both configs default to SQLite, so they run against a fresh scratch DB.
        continue-on-error: true
        run: |
          mkdir -p .astranotes
          alembic -c alembic.ini upgrade head
          alembic -c alembic_server.ini upgrade head
