# Alembic configuration for the AstraNotes sync server database.
#
# Usage:
#   alembic -c alembic_server.ini upgrade head
#
# Override the target database with an env var:
#   set ASTRANOTES_SERVER_DB_URL=postgresql+psycopg2://user:pass@host/dbname
#   alembic -c alembic_server.ini upgrade head

[alembic]
script_location = %(here)s/alembic_server
prepend_sys_path = .
path_separator = os

# Default SQLite URL - matches the server default in src/server/settings.py.
sqlalchemy.url = sqlite:///%(here)s/astranotes_sync.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
